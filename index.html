<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- tailwindcss Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Emergency Hotline</title>
</head>

<body>
    <header>

        <!-- nav bar -->
        <div class="navbar bg-base-100 shadow-sm justify-between px-4 md:px-[60px] flex-col md:flex-row gap-4 md:gap-0">

            <div class="flex items-center h-[70px] md:h-[100px] gap-2">
                <img class="w-full h-full object-cover" src="/assets/logo.png" alt="bangladesh-govt-logo">
                <h3 class="text-[#006747] font-extrabold text-[20px] md:text-[30px] leading-tight">Emergency <br>
                    Service</h3>
            </div>
            <div class="flex flex-wrap justify-center md:justify-end gap-3 md:gap-5 w-full md:w-auto">
                <button class="btn rounded-[50px] bg-[#41FF6B1A] border-none outline-none ">
                    <span class="text-xl font-extrabold">0</span>
                    <img class="w-full h-full object-cover" src="/assets/heart.png" alt="heart-icon">
                </button>
                <button class="btn rounded-[50px] bg-[#41FF6B1A] border-none outline-none">
                    <span class="text-xl font-extrabold">100</span>
                    <img class="w-full h-full object-cover" src="/assets/coin.png" alt="gold-colored-coin">
                </button>
                <button class="btn rounded-[50px] bg-[#00A63E] border-none outline-none"><span
                        class="text-[16px] font-bold text-[#FFFFFF]">0 Copy</span></button>
            </div>
        </div>



        <!-- hero/banner -->



        <div class="hero  min-h-60 bg-[linear-gradient(90deg,#013223_0%,#006747_49.99%,#013223_100%)] text-[#ffffff]">
            <div class="hero-content text-center">
                <div class="max-w-md flex flex-col items-center">
                    <img class="w-24 h-24  object-cover" src="/assets/logo.png" alt="bangladesh-govt-logo">
                    <h1 class="text-5xl font-bold">Emergency Service Directory</h1>
                    <p class="py-6">
                        Government Emergency Services at Your Fingertip – A Project by Government of the People’s
                        Republic of Bangladesh
                    </p>

                </div>
            </div>
        </div>


    </header>
    <main>

    </main>
    <footer>

    </footer>
</body>

</html>
